apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: chirpstack
data:
  0001-extensions.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname="$POSTGRES_DB" <<-EOSQL
        CREATE EXTENSION IF NOT EXISTS pg_trgm;
        CREATE EXTENSION IF NOT EXISTS hstore;
    EOSQL
