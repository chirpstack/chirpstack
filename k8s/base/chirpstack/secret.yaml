apiVersion: v1
kind: Secret
metadata:
  name: chirpstack
  namespace: chirpstack
type: Opaque
stringData:
  # Generate with: openssl rand -base64 32
  CHIRPSTACK_API_SECRET: "REPLACE_WITH_RANDOM_SECRET"
  # Must match k8s/postgres/secret.yaml
  POSTGRES_USER: chirpstack
  POSTGRES_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"
  POSTGRES_DB: chirpstack
