apiVersion: v1
kind: ConfigMap
metadata:
  name: chirpstack
  namespace: chirpstack
data:
  chirpstack.toml: |
    [logging]
      level = "info"

    [postgresql]
      # $POSTGRES_USER, $POSTGRES_PASSWORD, $POSTGRES_DB are injected from the chirpstack Secret
      dsn = "postgres://$POSTGRES_USER:$POSTGRES_PASSWORD@postgres:5432/$POSTGRES_DB?sslmode=disable"
      max_open_connections = 10
      min_idle_connections = 0
      connection_recycling_method = "verified"

    [redis]
      servers = ["redis://redis:6379/"]
      cluster = false

    [api]
      bind = "0.0.0.0:8080"
      # $CHIRPSTACK_API_SECRET is injected from the chirpstack Secret
      secret = "$CHIRPSTACK_API_SECRET"

    [integration]
      enabled = ["mqtt"]

      [integration.mqtt]
        server = "tcp://mosquitto:1883/"
        json = true

    [network]
      net_id = "000000"
      enabled_regions = [
        "eu868",
      ]

    [monitoring]
      bind = "0.0.0.0:8081"

  region_eu868.toml: |
    [[regions]]
      id = "eu868"
      description = "EU868"
      common_name = "EU868"
      user_info = ""

      [regions.gateway]
        force_gws_private = false

        [regions.gateway.backend]
          enabled = "mqtt"

          [regions.gateway.backend.mqtt]
            topic_prefix = "eu868"
            share_name = "chirpstack"
            server = "tcp://mosquitto:1883"
            qos = 0
            clean_session = false
            client_id = ""
            keep_alive_interval = "30s"
            ca_cert = ""
            tls_cert = ""
            tls_key = ""

      [[regions.gateway.channels]]
        frequency = 868100000
        bandwidth = 125000
        modulation = "LORA"
        spreading_factors = [7, 8, 9, 10, 11, 12]

      [[regions.gateway.channels]]
        frequency = 868300000
        bandwidth = 125000
        modulation = "LORA"
        spreading_factors = [7, 8, 9, 10, 11, 12]

      [[regions.gateway.channels]]
        frequency = 868500000
        bandwidth = 125000
        modulation = "LORA"
        spreading_factors = [7, 8, 9, 10, 11, 12]

      [[regions.gateway.channels]]
        frequency = 867100000
        bandwidth = 125000
        modulation = "LORA"
        spreading_factors = [7, 8, 9, 10, 11, 12]

      [[regions.gateway.channels]]
        frequency = 867300000
        bandwidth = 125000
        modulation = "LORA"
        spreading_factors = [7, 8, 9, 10, 11, 12]

      [[regions.gateway.channels]]
        frequency = 867500000
        bandwidth = 125000
        modulation = "LORA"
        spreading_factors = [7, 8, 9, 10, 11, 12]

      [[regions.gateway.channels]]
        frequency = 867700000
        bandwidth = 125000
        modulation = "LORA"
        spreading_factors = [7, 8, 9, 10, 11, 12]

      [[regions.gateway.channels]]
        frequency = 867900000
        bandwidth = 125000
        modulation = "LORA"
        spreading_factors = [7, 8, 9, 10, 11, 12]

      [[regions.gateway.channels]]
        frequency = 868300000
        bandwidth = 250000
        modulation = "LORA"
        spreading_factors = [7]

      [[regions.gateway.channels]]
        frequency = 868800000
        bandwidth = 125000
        modulation = "FSK"
        datarate = 50000

      [regions.network]
        installation_margin = 10
        rx_window = 0
        rx1_delay = 1
        rx1_dr_offset = 0
        rx2_dr = 0
        rx2_frequency = 869525000
        rx2_prefer_on_rx1_dr_lt = 0
        rx2_prefer_on_link_budget = false
        downlink_tx_power = -1
        adr_disabled = false
        min_dr = 0
        max_dr = 5

        [regions.network.rejoin_request]
          enabled = false
          max_count_n = 0
          max_time_n = 0

        [regions.network.class_b]
          ping_slot_dr = 3
          ping_slot_frequency = 0

        [[regions.network.extra_channels]]
          frequency = 867100000
          min_dr = 0
          max_dr = 5

        [[regions.network.extra_channels]]
          frequency = 867300000
          min_dr = 0
          max_dr = 5

        [[regions.network.extra_channels]]
          frequency = 867500000
          min_dr = 0
          max_dr = 5

        [[regions.network.extra_channels]]
          frequency = 867700000
          min_dr = 0
          max_dr = 5

        [[regions.network.extra_channels]]
          frequency = 867900000
          min_dr = 0
          max_dr = 5
