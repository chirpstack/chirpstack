## ChirpStack Helm Chart values
## See comments below each section for details.

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# ─── ChirpStack ────────────────────────────────────────────────────────────────
chirpstack:
  image:
    repository: chirpstack/chirpstack
    tag: "4"
    pullPolicy: IfNotPresent

  replicaCount: 1

  logging:
    level: info   # trace | debug | info | warn | error

  # API secret used to sign login and API tokens.
  # Generate with: openssl rand -base64 32
  # In production, use a Kubernetes Secret and set apiSecretExistingSecret.
  apiSecret: "REPLACE_WITH_RANDOM_SECRET"
  # If set, use this existing Secret's key instead of creating one from apiSecret.
  apiSecretExistingSecret: ""
  apiSecretExistingSecretKey: "CHIRPSTACK_API_SECRET"

  network:
    netId: "000000"
    # Must match the region IDs listed under chirpstack.regions below.
    enabledRegions:
      - eu868

  integration:
    enabled:
      - mqtt
    mqtt:
      json: true

  monitoring:
    enabled: true
    bind: "0.0.0.0:8081"

  # Region configuration files. Each key is used as the filename
  # (region_<key>.toml). Add or remove regions as needed.
  # The MQTT server field is rendered automatically from mosquitto.service.
  regions:
    eu868: |
      [[regions]]
        id = "eu868"
        description = "EU868"
        common_name = "EU868"
        user_info = ""

        [regions.gateway]
          force_gws_private = false

          [regions.gateway.backend]
            enabled = "mqtt"

            [regions.gateway.backend.mqtt]
              topic_prefix = "eu868"
              share_name = "chirpstack"
              server = "MQTT_SERVER_PLACEHOLDER"
              qos = 0
              clean_session = false
              client_id = ""
              keep_alive_interval = "30s"
              ca_cert = ""
              tls_cert = ""
              tls_key = ""

        [[regions.gateway.channels]]
          frequency = 868100000
          bandwidth = 125000
          modulation = "LORA"
          spreading_factors = [7, 8, 9, 10, 11, 12]

        [[regions.gateway.channels]]
          frequency = 868300000
          bandwidth = 125000
          modulation = "LORA"
          spreading_factors = [7, 8, 9, 10, 11, 12]

        [[regions.gateway.channels]]
          frequency = 868500000
          bandwidth = 125000
          modulation = "LORA"
          spreading_factors = [7, 8, 9, 10, 11, 12]

        [[regions.gateway.channels]]
          frequency = 867100000
          bandwidth = 125000
          modulation = "LORA"
          spreading_factors = [7, 8, 9, 10, 11, 12]

        [[regions.gateway.channels]]
          frequency = 867300000
          bandwidth = 125000
          modulation = "LORA"
          spreading_factors = [7, 8, 9, 10, 11, 12]

        [[regions.gateway.channels]]
          frequency = 867500000
          bandwidth = 125000
          modulation = "LORA"
          spreading_factors = [7, 8, 9, 10, 11, 12]

        [[regions.gateway.channels]]
          frequency = 867700000
          bandwidth = 125000
          modulation = "LORA"
          spreading_factors = [7, 8, 9, 10, 11, 12]

        [[regions.gateway.channels]]
          frequency = 867900000
          bandwidth = 125000
          modulation = "LORA"
          spreading_factors = [7, 8, 9, 10, 11, 12]

        [[regions.gateway.channels]]
          frequency = 868300000
          bandwidth = 250000
          modulation = "LORA"
          spreading_factors = [7]

        [[regions.gateway.channels]]
          frequency = 868800000
          bandwidth = 125000
          modulation = "FSK"
          datarate = 50000

        [regions.network]
          installation_margin = 10
          rx_window = 0
          rx1_delay = 1
          rx1_dr_offset = 0
          rx2_dr = 0
          rx2_frequency = 869525000
          rx2_prefer_on_rx1_dr_lt = 0
          rx2_prefer_on_link_budget = false
          downlink_tx_power = -1
          adr_disabled = false
          min_dr = 0
          max_dr = 5

          [regions.network.rejoin_request]
            enabled = false
            max_count_n = 0
            max_time_n = 0

          [regions.network.class_b]
            ping_slot_dr = 3
            ping_slot_frequency = 0

          [[regions.network.extra_channels]]
            frequency = 867100000
            min_dr = 0
            max_dr = 5

          [[regions.network.extra_channels]]
            frequency = 867300000
            min_dr = 0
            max_dr = 5

          [[regions.network.extra_channels]]
            frequency = 867500000
            min_dr = 0
            max_dr = 5

          [[regions.network.extra_channels]]
            frequency = 867700000
            min_dr = 0
            max_dr = 5

          [[regions.network.extra_channels]]
            frequency = 867900000
            min_dr = 0
            max_dr = 5

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  service:
    type: ClusterIP
    port: 8080
    monitoringPort: 8081
    annotations: {}

  ingress:
    enabled: false
    className: nginx
    host: chirpstack.example.com
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    tls:
      enabled: false
      secretName: chirpstack-tls

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ─── PostgreSQL ────────────────────────────────────────────────────────────────
postgresql:
  enabled: true

  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent

  auth:
    username: chirpstack
    # Generate with: openssl rand -hex 16
    password: "REPLACE_WITH_SECURE_PASSWORD"
    database: chirpstack
    # If set, pull password from this existing Secret key instead.
    existingSecret: ""
    existingSecretKey: "POSTGRES_PASSWORD"

  storage:
    size: 10Gi
    # storageClass: ""   # Uncomment to set a specific StorageClass

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ─── Redis ─────────────────────────────────────────────────────────────────────
redis:
  enabled: true

  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent

  storage:
    size: 2Gi
    # storageClass: ""

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ─── Mosquitto (MQTT broker) ───────────────────────────────────────────────────
mosquitto:
  enabled: true

  image:
    repository: eclipse-mosquitto
    tag: "2"
    pullPolicy: IfNotPresent

  config: |
    listener 1883
    allow_anonymous true

    persistence true
    persistence_location /mosquitto/data/

    log_dest stdout
    log_type error
    log_type warning
    log_type notice
    log_type information

  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

  service:
    type: ClusterIP
    port: 1883
    annotations: {}
